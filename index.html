<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass ClassWiz Calculator</title>
    <link rel="stylesheet" href="/static/calculator/style.css?v=1.2">
    <!-- Math.js for robust frontend computation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>
<body>
    <div class="calculator-container">
        <!-- Main calculator body featuring iOS liquid glass look -->
        <div class="calculator-glass">
            
            <div class="display-bezel">
                <div class="display-screen">
                    <div class="top-status">
                        <span>S</span> <span>A</span> <span>M</span> <span>STO</span> <span>RCT</span> <span>DEG</span> <span>W-VIEW</span>
                    </div>
                    <div class="expression-area">
                        <div class="expression" id="expr-display"></div>
                        <div class="cursor" id="cursor"></div>
                    </div>
                    <div class="result" id="res-display"></div>
                </div>
            </div>

            <div class="brand-text">CLASSWIZ WEB APP</div>

            <div class="controls-area">
                <!-- Top Nav / Special Buttons -->
                <div class="top-utils">
                    <button class="jewel-btn small-btn silver" onclick="pressBtn('SHIFT')">SHIFT</button>
                    <button class="jewel-btn small-btn silver" onclick="pressBtn('ALPHA')">ALPHA</button>
                    
                    <div class="d-pad-container jewel-btn silver">
                        <button class="d-pad up" onclick="pressBtn('UP')">▲</button>
                        <button class="d-pad down" onclick="pressBtn('DOWN')">▼</button>
                        <button class="d-pad left" onclick="pressBtn('LEFT')">◀</button>
                        <button class="d-pad right" onclick="pressBtn('RIGHT')">▶</button>
                        <div class="d-pad-center"></div>
                    </div>

                    <button class="jewel-btn small-btn silver" onclick="pressBtn('MODE')">ON</button>
                    <button class="jewel-btn small-btn silver" onclick="pressBtn('SETUP')">SETUP</button>
                </div>
                
                <!-- Scientific Grid -->
                <div class="sci-grid">
                    <div class="btn-pack"><span class="btn-label">OPTN</span><button class="jewel-btn dark" onclick="pressBtn('OPTN')">OPTN</button></div>
                    <div class="btn-pack"><span class="btn-label">CALC</span><button class="jewel-btn dark" onclick="pressBtn('CALC')">CALC</button></div>
                    <div class="btn-pack"><span class="btn-label">∫</span><button class="jewel-btn dark" onclick="pressBtn('∫')">∫ dx</button></div>
                    <div class="btn-pack"><span class="btn-label">x</span><button class="jewel-btn dark" onclick="pressBtn('x')">x</button></div>
                    
                    <div class="btn-pack"><span class="btn-label">■/□</span><button class="jewel-btn dark" onclick="pressBtn('frac')">■/□</button></div>
                    <div class="btn-pack"><span class="btn-label">√</span><button class="jewel-btn dark" onclick="pressBtn('√(')">√</button></div>
                    <div class="btn-pack"><span class="btn-label">x²</span><button class="jewel-btn dark" onclick="pressBtn('²')">x²</button></div>
                    <div class="btn-pack"><span class="btn-label">x^■</span><button class="jewel-btn dark" onclick="pressBtn('^')">x^</button></div>
                    <div class="btn-pack"><span class="btn-label">log</span><button class="jewel-btn dark" onclick="pressBtn('log(')">log</button></div>
                    <div class="btn-pack"><span class="btn-label">ln</span><button class="jewel-btn dark" onclick="pressBtn('ln(')">ln</button></div>
                    
                    <div class="btn-pack"><span class="btn-label">(-)</span><button class="jewel-btn dark" onclick="pressBtn('(-)')">(-)</button></div>
                    <div class="btn-pack"><span class="btn-label">°r g</span><button class="jewel-btn dark" onclick="pressBtn('°')">° ' "</button></div>
                    <div class="btn-pack"><span class="btn-label">x⁻¹</span><button class="jewel-btn dark" onclick="pressBtn('⁻¹')">x⁻¹</button></div>
                    <div class="btn-pack"><span class="btn-label">sin</span><button class="jewel-btn dark" onclick="pressBtn('sin(')">sin</button></div>
                    <div class="btn-pack"><span class="btn-label">cos</span><button class="jewel-btn dark" onclick="pressBtn('cos(')">cos</button></div>
                    <div class="btn-pack"><span class="btn-label">tan</span><button class="jewel-btn dark" onclick="pressBtn('tan(')">tan</button></div>

                    <div class="btn-pack"><span class="btn-label">STO</span><button class="jewel-btn dark" onclick="pressBtn('STO')">STO</button></div>
                    <div class="btn-pack"><span class="btn-label">ENG</span><button class="jewel-btn dark" onclick="pressBtn('ENG')">ENG</button></div>
                    <div class="btn-pack"><span class="btn-label">(</span><button class="jewel-btn dark" onclick="pressBtn('(')">(</button></div>
                    <div class="btn-pack"><span class="btn-label">)</span><button class="jewel-btn dark" onclick="pressBtn(')')">)</button></div>
                    <div class="btn-pack"><span class="btn-label">S⇔D</span><button class="jewel-btn dark" onclick="pressBtn('SD')">S⇔D</button></div>
                    <div class="btn-pack"><span class="btn-label">M+</span><button class="jewel-btn dark" onclick="pressBtn('M+')">M+</button></div>
                </div>

                <!-- Main Numpad Grid -->
                <div class="main-grid">
                    <button class="jewel-btn white num-btn" onclick="pressBtn('7')">7</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('8')">8</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('9')">9</button>
                    <button class="jewel-btn orange del-btn" onclick="pressBtn('DEL')">DEL</button>
                    <button class="jewel-btn orange ac-btn" onclick="pressBtn('AC')">AC</button>

                    <button class="jewel-btn white num-btn" onclick="pressBtn('4')">4</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('5')">5</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('6')">6</button>
                    <button class="jewel-btn white op-btn" onclick="pressBtn('×')">×</button>
                    <button class="jewel-btn white op-btn" onclick="pressBtn('÷')">÷</button>

                    <button class="jewel-btn white num-btn" onclick="pressBtn('1')">1</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('2')">2</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('3')">3</button>
                    <button class="jewel-btn white op-btn" onclick="pressBtn('+')">+</button>
                    <button class="jewel-btn white op-btn" onclick="pressBtn('-')">−</button>

                    <button class="jewel-btn white num-btn" onclick="pressBtn('0')">0</button>
                    <button class="jewel-btn white num-btn" onclick="pressBtn('.')">.</button>
                    <button class="jewel-btn white op-btn" onclick="pressBtn('×10^')">×10ˣ</button>
                    <button class="jewel-btn white ans-btn" onclick="pressBtn('Ans')">Ans</button>
                    <button class="jewel-btn white eq-btn" onclick="pressBtn('=')">=</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentExpression = '';
        const exprDisplay = document.getElementById('expr-display');
        const resDisplay = document.getElementById('res-display');
        
        // Add a rippling liquid glass animation dynamically on click
        function createRipple(e, btn) {
            const ripple = document.createElement('span');
            ripple.classList.add('glass-ripple');
            
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            // Check if we have standard click coordinates, otherwise fall back to center
            const x = e.clientX ? e.clientX - rect.left - size / 2 : rect.width / 2 - size / 2;
            const y = e.clientY ? e.clientY - rect.top - size / 2 : rect.height / 2 - size / 2;
            
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            
            btn.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // Add a tactile CSS class
        function triggerJewelPress(btn) {
            btn.classList.add('pressed');
            setTimeout(() => {
                btn.classList.remove('pressed');
            }, 150);
        }

        document.querySelectorAll('.jewel-btn, .d-pad').forEach(btn => {
            btn.addEventListener('click', function(e) {
                createRipple(e, this);
                triggerJewelPress(this);
            });
        });

        function pressBtn(val) {
            if (val === 'AC') {
                currentExpression = '';
                resDisplay.innerText = '';
            } else if (val === 'DEL') {
                currentExpression = currentExpression.slice(0, -1);
            } else if (val === '=') {
                calculate();
                return;
            } else if (val === 'frac') {
                currentExpression += '/';
            } else if (val === 'SD' || val === 'OPTN' || val === 'CALC' || val === 'STO' || val === 'ENG' || val === 'SHIFT' || val === 'ALPHA' || val === 'MODE' || val === 'SETUP' || val === 'UP' || val === 'DOWN' || val === 'LEFT' || val === 'RIGHT' || val === '∫') {
                // Ignore layout/unsupported buttons for now
            } else {
                currentExpression += val;
            }
            updateDisplay();
        }

        function updateDisplay() {
            exprDisplay.innerText = currentExpression;
        }

        function calculate() {
            if (!currentExpression) return;
            
            // Map our UI expression symbols to mathjs compliant symbols
            let evalExpr = currentExpression;
            
            evalExpr = evalExpr.replace(/×/g, '*');
            evalExpr = evalExpr.replace(/÷/g, '/');
            evalExpr = evalExpr.replace(/−/g, '-');
            // Allow negative signs typed via "(-)" as normal minus
            evalExpr = evalExpr.replace(/\(-\)/g, '-');
            
            // Degrees (mathjs requires an explicit ' deg' for degree math)
            evalExpr = evalExpr.replace(/°/g, ' deg');
            
            // Square Root
            evalExpr = evalExpr.replace(/√\(/g, 'sqrt(');
            
            // Powers
            evalExpr = evalExpr.replace(/²/g, '^2');
            evalExpr = evalExpr.replace(/⁻¹/g, '^-1');
            
            // Logarithms
            // "log(" usually means log base 10 in casio. Mathjs log is natural log by default, log10 is base 10.
            evalExpr = evalExpr.replace(/log\(/g, 'log10(');
            // ln is log in mathjs
            evalExpr = evalExpr.replace(/ln\(/g, 'log(');

            // x10x function
            evalExpr = evalExpr.replace(/×10\^/g, '*10^');
            
            try {
                // If expression is purely numeric or safe, parse it
                let result = math.evaluate(evalExpr);
                
                // Format appropriately (cut off tiny decimals if needed)
                if (typeof result === 'number') {
                    // Try to display precisely like ClassWiz (e.g., 9 decimals)
                    let formatted = math.format(result, {precision: 10});
                    resDisplay.innerText = formatted;
                } else {
                    resDisplay.innerText = result;
                }
            } catch (err) {
                resDisplay.innerText = 'Syntax ERROR';
            }
        }
    </script>
</body>
</html>
